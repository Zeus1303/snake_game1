name: Build Snake Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Debug: xem cấu trúc thư mục thực tế
      - name: Show directory structure
        run: Get-ChildItem -Recurse -Depth 2
        shell: pwsh

      # Tìm CMakeLists.txt ở bất kỳ đâu trong repo
      - name: Find CMakeLists.txt
        run: Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object FullName
        shell: pwsh

      - name: Install SFML via vcpkg
        run: vcpkg install sfml:x64-windows
        shell: cmd

      - name: Configure CMake
        run: |
          $cmake_dir = (Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object -First 1).DirectoryName
          Write-Host "Found CMakeLists.txt at: $cmake_dir"
          cmake -B build -S "$cmake_dir" `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake.`
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Copy font
        run: copy "C:\Windows\Fonts\arial.ttf" "build\Release\arial.ttf"
        shell: cmd

      - name: Copy SFML DLLs
        run: |
          copy "C:\vcpkg\installed\x64-windows\bin\sfml-graphics-3.dll"  "build\Release\" 2>$null
          copy "C:\vcpkg\installed\x64-windows\bin\sfml-window-3.dll"    "build\Release\" 2>$null
          copy "C:\vcpkg\installed\x64-windows\bin\sfml-system-3.dll"    "build\Release\" 2>$null
          copy "C:\vcpkg\installed\x64-windows\bin\freetype.dll"         "build\Release\" 2>$null
        shell: cmd
        continue-on-error: true

      - name: Package release
        run: |
          mkdir SnakeGame
          copy build\Release\SnakeGame.exe SnakeGame\
          copy build\Release\arial.ttf     SnakeGame\
          xcopy /s /i build\Release\*.dll  SnakeGame\
          Compress-Archive -Path SnakeGame -DestinationPath SnakeGame-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-Windows
          path: SnakeGame-Windows.zip
          retention-days: 30
